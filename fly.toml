# fly.toml app configuration file generated for docket-r8iz7q on 2026-07-22T10:22:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'docket-r8iz7q'
primary_region = 'syd'

[build]

[env]
  DB_PATH = '/data/invoices.db'
  PORT = '3000'

[[mounts]]
  source = 'abn_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
