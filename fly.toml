app = "abn-invoice-verifier"
primary_region = "syd"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/invoices.db"

[[mounts]]
  source = "abn_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
